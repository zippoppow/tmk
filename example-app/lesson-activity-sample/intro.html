    <!-- TMK API-auth configuration -->
    <script>
        const TMK_API_ORIGINS = {
            production: 'https://tmk-api.up.railway.app',
            staging: 'https://tmk-api.up.railway.app'
        };

        function resolveTmkApiOrigin() {
            const { protocol, hostname } = window.location;

            if (
                protocol === 'file:' ||
                !hostname ||
                hostname === 'localhost' ||
                hostname === '127.0.0.1' ||
                hostname.endsWith('.local') ||
                hostname.includes('railway.app') ||
                hostname.includes('staging')
            ) {
                return TMK_API_ORIGINS.staging;
            }

            if (hostname === 'tmk.themorphologykit.com' || hostname.endsWith('.themorphologykit.com')) {
                return TMK_API_ORIGINS.production;
            }

            return TMK_API_ORIGINS.production;
        }

        const OAUTH_CONFIG = {
            API_ORIGIN: resolveTmkApiOrigin(),
            START_ENDPOINT: '/api/auth/teachable/start',
            ME_ENDPOINT: '/api/auth/teachable/me',
            LOGOUT_ENDPOINT: '/api/auth/teachable/logout'
        };

        // These endpoints are owned by TMK API. In local development, the Next app
        // can proxy the same paths through rewrites so the browser still uses a
        // same-origin URL while TMK API remains the single auth authority.

        const AUTH_QUERY_PARAM = 'auth';
        const AUTH_SUCCESS_VALUE = 'success';
        const AUTH_HINT_STORAGE_KEY = 'tmk_teachable_auth_hint';
        const AUTH_EMAIL_STORAGE_KEY = 'tmk_teachable_user_email';

        // ===== STORAGE UTILITIES =====
        const FORM_NAME = 'intro';
        const STORAGE_KEY = 'tmk-diy-sessions';

        function debounce(func, delay) {
            let timeoutId;
            return function(...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func(...args), delay);
            };
        }

        function saveToStorage() {

            const data = { timestamp: Date.now() };

        // ===== OAUTH INTEGRATION =====

        function setAuthHint(enabled) {
            if (enabled) {
                sessionStorage.setItem(AUTH_HINT_STORAGE_KEY, '1');
            } else {
                sessionStorage.removeItem(AUTH_HINT_STORAGE_KEY);
            }
        }

        function hasAuthHint() {
            return sessionStorage.getItem(AUTH_HINT_STORAGE_KEY) === '1';
        }

        function isUserAuthenticated() {

        function initiateOAuthLogin() {
            const authUrl = new URL(`${OAUTH_CONFIG.API_ORIGIN}${OAUTH_CONFIG.START_ENDPOINT}`);
            authUrl.searchParams.set('redirectTo', window.location.href);
            window.location.href = authUrl.toString();
        }

        function extractAuthenticatedUser(data) {
            if (!data || typeof data !== 'object') {
                return null;
            }

            const explicitAuth =
                typeof data.authenticated === 'boolean' ? data.authenticated :
                typeof data.isAuthenticated === 'boolean' ? data.isAuthenticated :
                typeof data.loggedIn === 'boolean' ? data.loggedIn :
                null;

            const user = data.user || data.member || data.currentUser || null;
            const inferredUser = user || ((data.email || data.id || data.name) ? data : null);

            if (explicitAuth === false) {
                return null;
            }

            if (explicitAuth === true) {
                return inferredUser || {};
            }

            return inferredUser;
        }

        async function fetchAuthStatus() {
            try {
                const response = await fetch(`${OAUTH_CONFIG.API_ORIGIN}${OAUTH_CONFIG.ME_ENDPOINT}`, {
                    method: 'GET',
                    credentials: 'include'
                });

                if (!response.ok) {
                    return null;
                }

                const data = await response.json();
                return extractAuthenticatedUser(data);
            } catch (error) {
                console.error('Failed to check auth status:', error);
                return null;
            }
        }

        function setStoredUserEmail(email) {
            if (email) {
                sessionStorage.setItem(AUTH_EMAIL_STORAGE_KEY, email);
            } else {
                sessionStorage.removeItem(AUTH_EMAIL_STORAGE_KEY);
            }
        }

        function getStoredUserEmail() {
            return sessionStorage.getItem(AUTH_EMAIL_STORAGE_KEY) || '';
        }

        function getUserEmail() {

                return currentAuthUser.email;
            }
            return getStoredUserEmail();
        }

        async function logoutFromTeachable() {

                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                console.error('Failed to log out:', error);
            } finally {
                currentAuthUser = null;
                setAuthHint(false);
                setStoredUserEmail('');

        function renderAuthStatus() {
            const authStatus = document.getElementById('authStatus');
            const loginBtn = document.getElementById('loginBtn');

            if (isUserAuthenticated()) {
                const userLabel = currentAuthUser.name || currentAuthUser.email || 'Teachable';
                authStatus.textContent = `✓ Authenticated as ${userLabel}`;
                authStatus.classList.remove('not-authenticated');
                authStatus.classList.add('authenticated');
                loginBtn.textContent = 'Logout';
            } else {
                authStatus.textContent = '✗ Not Authenticated';
                authStatus.classList.remove('authenticated');
                authStatus.classList.add('not-authenticated');
                loginBtn.textContent = 'Login with Teachable';

        async function updateAuthStatus(options = {}) {
            const authStatus = document.getElementById('authStatus');
            const loginBtn = document.getElementById('loginBtn');
            const { allowHintFallback = false } = options;

            authStatus.textContent = 'Checking authentication...';
            authStatus.classList.remove('authenticated');
            authStatus.classList.add('not-authenticated');
            loginBtn.disabled = true;

            const verifiedUser = await fetchAuthStatus();
            if (verifiedUser) {
                currentAuthUser = verifiedUser;
                setAuthHint(true);
                if (verifiedUser.email) {
                    setStoredUserEmail(verifiedUser.email);
                }
            } else if (allowHintFallback && hasAuthHint()) {
                currentAuthUser = currentAuthUser || { name: 'Teachable' };
            } else {
                currentAuthUser = null;

            renderAuthStatus();
            loginBtn.disabled = false;

        function normalizeIntroLessonInputData(rawData) {

        function createLessonActivitySnapshot(projectName, lessonName, lessonInputData = null) {
            const now = Date.now();
            return {
                'tmk-template': FORM_NAME,
                'lesson-name': String(lessonName || projectName || ''),
                'created-at': now,
                'modified-at': now,

                    : normalizeIntroLessonInputData(captureCurrentFormData())
            };
        }

        function getUniqueLessonActivityName(project, requestedName, excludeIndex = -1) {
            const baseName = String(requestedName || '').trim();
            const fallbackBase = baseName || 'Lesson Activity';
            const usedNames = new Set(
                getProjectLessonActivities(project)
                    .map((activity, idx) => ({ name: String(activity['lesson-name'] || '').trim(), idx }))
                    .filter(item => item.idx !== excludeIndex)
                    .map(item => item.name)
            );

            if (!usedNames.has(fallbackBase)) {
                return fallbackBase;
            }

            let suffix = 2;
            let candidate = `${fallbackBase} ${suffix}`;
            while (usedNames.has(candidate)) {
                suffix += 1;
                candidate = `${fallbackBase} ${suffix}`;
            }
            return candidate;
        }

        function getProjectLessonActivities(project) {
            if (project && Array.isArray(project.lessonActivities) && project.lessonActivities.length > 0) {
                return project.lessonActivities;
            }

            // Backward compatibility with older single-snapshot local projects.
            if (project && project.data && typeof project.data === 'object') {
                const createdAt = Number.isFinite(project.createdAtMs) ? project.createdAtMs : Date.now();
                const modifiedAt = Number.isFinite(project.modifiedAtMs) ? project.modifiedAtMs : createdAt;
                return [{
                    'tmk-template': FORM_NAME,
                    'lesson-name': String(project.name || ''),
                    'created-at': createdAt,
                    'modified-at': modifiedAt,
                    'lesson-input-data': normalizeIntroLessonInputData(project.data)
                }];

            return [];
        }

                    const latest = lessonActivities.length > 0 ? lessonActivities[lessonActivities.length - 1] : null;
                    return {
                        ...p,
                        source: 'local',
                        lessonActivities,
                        data: latest && latest['lesson-input-data'] ? latest['lesson-input-data'] : {}
                    };
                });

            const cloudOnlyProjects = cloudProjects.filter(cp => !localProjects.some(lp => {
                const sameName = (lp.name || '').trim() === (cp.name || '').trim();
                const sameActivities = JSON.stringify(lp.lessonActivities || []) === JSON.stringify(cp.lessonActivities || []);
                return sameName && sameActivities;
            }));

            return [...localProjects, ...cloudOnlyProjects];

        function createLocalProject(name) {
            const now = Date.now();
            const trimmedName = name.trim();
            if (!trimmedName) {
                return null;

            const projects = getAllProjects();
            const existing = projects.find(p => p.formName === FORM_NAME && (p.name || '').trim() === trimmedName);
            if (existing) {
                return existing;
            }

            const project = {
                id: `proj_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,

                createdAt: new Date(now).toISOString(),
                createdAtMs: now,
                modifiedAtMs: now,
                syncedAt: null,
                lessonActivities: []
            };

            projects.unshift(project);
            saveAllProjects(projects);
            return project;
        }

        function createNewBlankLessonActivity(projectId, requestedLessonName) {
            const projects = getAllProjects();
            const project = projects.find(p => p.id === projectId);
            if (!project) {
                return null;

            const currentActivities = getProjectLessonActivities(project);
            const uniqueLessonName = getUniqueLessonActivityName(project, requestedLessonName || project.name || 'Lesson Activity');
            const snapshot = createLessonActivitySnapshot(project.name, uniqueLessonName, createEmptyIntroLessonInputData());

            project.lessonActivities = [...currentActivities, snapshot];
            project.modifiedAtMs = Date.now();
            project.syncedAt = null;
            saveAllProjects(projects);
            return { project, activityIndex: project.lessonActivities.length - 1 };
        }

        function extractDiyProjectsFromResponse(payload) {
            if (Array.isArray(payload)) {
                return payload.flatMap(item => {
                    if (item && Array.isArray(item['diy-projects'])) {
                        return item['diy-projects'];
                    }
                    if (item && item['project-name']) {
                        return [item];
                    }
                    return [];
                });
            }

            if (payload && typeof payload === 'object' && Array.isArray(payload['diy-projects'])) {
                return payload['diy-projects'];
            }

            return [];
        }

        function normalizeCloudProjects(payload) {
            const diyProjects = extractDiyProjectsFromResponse(payload);
            const normalized = [];

            diyProjects.forEach((project, projectIndex) => {
                const activities = Array.isArray(project['lesson-activities']) ? project['lesson-activities'] : [];
                if (activities.length === 0) {
                    return;
                }

                const createdAtRaw = project['created-at'] || activities[0]['created-at'] || Date.now();
                const modifiedAtRaw = project['modified-at'] || activities[activities.length - 1]['modified-at'] || createdAtRaw;
                const createdAtIso = Number.isFinite(Number(createdAtRaw))
                    ? new Date(Number(createdAtRaw)).toISOString()
                    : String(createdAtRaw);
                const syncedAtIso = Number.isFinite(Number(modifiedAtRaw))
                    ? new Date(Number(modifiedAtRaw)).toISOString()
                    : String(modifiedAtRaw);

                const lessonActivities = activities
                    .filter(activity => activity && activity['lesson-input-data'] && typeof activity['lesson-input-data'] === 'object')
                    .map(activity => ({
                        'tmk-template': String(activity['tmk-template'] || ''),
                        'lesson-name': String(activity['lesson-name'] || project['project-name'] || ''),
                        'created-at': Number.isFinite(Number(activity['created-at'])) ? Number(activity['created-at']) : Date.now(),
                        'modified-at': Number.isFinite(Number(activity['modified-at'])) ? Number(activity['modified-at']) : Date.now(),
                        'lesson-input-data': activity['lesson-input-data']
                    }));

                if (lessonActivities.length === 0) {
                    return;
                }

                const latest = lessonActivities[lessonActivities.length - 1];
                normalized.push({
                    id: `cloud_${projectIndex}_${String(project['project-name'] || 'project')}`,
                    source: 'cloud',
                    name: String(project['project-name'] || latest['lesson-name'] || 'Untitled Cloud Project'),
                    createdAt: createdAtIso,
                    createdAtMs: Number.isFinite(Number(createdAtRaw)) ? Number(createdAtRaw) : Date.now(),
                    modifiedAtMs: Number.isFinite(Number(modifiedAtRaw)) ? Number(modifiedAtRaw) : Date.now(),
                    syncedAt: syncedAtIso,
                    lessonActivities,
                    data: latest['lesson-input-data']
                });
            });

            return normalized;
        }

        async function loadCloudProjects() {
            if (!isUserAuthenticated()) {
                cloudProjects = [];
                isLoadingCloudProjects = false;
                setCloudLoadStatus('');
                updateRefreshCloudButtonState();
                renderProjectList();
                return;
            }

            isLoadingCloudProjects = true;
            setCloudLoadStatus('');
            updateRefreshCloudButtonState();
            renderProjectList();

            try {
                const response = await fetch(`${OAUTH_CONFIG.API_ORIGIN}${DIY_PROJECTS_ENDPOINT}`, {
                    method: 'GET',
                    credentials: 'include'
                });

                if (!response.ok) {
                    cloudProjects = [];
                    setCloudLoadStatus('Cloud load failed. Please try Refresh Cloud.');
                    return;
                }

                const payload = await response.json();
                cloudProjects = normalizeCloudProjects(payload);
            } catch (error) {
                console.error('Failed to load cloud projects:', error);
                cloudProjects = [];
                setCloudLoadStatus('Cloud load failed. Please try Refresh Cloud.');
            } finally {
                isLoadingCloudProjects = false;
                updateRefreshCloudButtonState();
                renderProjectList();
            }
        }

        function buildDiyProjectsPayload(project) {
            const now = Date.now();
            const createdAtMs = Number.isFinite(project.createdAtMs) ? project.createdAtMs : now;
            const modifiedAtMs = Number.isFinite(project.modifiedAtMs) ? project.modifiedAtMs : now;
            const userEmail = getUserEmail();
            const sourceActivities = getProjectLessonActivities(project);
            const normalizedActivities = sourceActivities.length > 0
                ? sourceActivities
                : [createLessonActivitySnapshot(project.name || '', project.name || '')];
            const lessonActivities = normalizedActivities.map(activity => {
                const template = String(activity['tmk-template'] || FORM_NAME);
                const sourceData = activity['lesson-input-data'] && typeof activity['lesson-input-data'] === 'object'
                    ? activity['lesson-input-data']
                    : {};
                return {
                    'tmk-template': template,
                    'lesson-name': String(activity['lesson-name'] || project.name || ''),
                    'created-at': Number.isFinite(Number(activity['created-at'])) ? Number(activity['created-at']) : createdAtMs,
                    'modified-at': Number.isFinite(Number(activity['modified-at'])) ? Number(activity['modified-at']) : modifiedAtMs,
                    'lesson-input-data': template === 'intro'
                        ? normalizeIntroLessonInputData(sourceData)
                        : sourceData
                };
            });

            return {
                'user-email': userEmail,
                'diy-projects': [
                    {
                        'project-name': String(project.name || ''),
                        'created-at': createdAtMs,
                        'modified-at': modifiedAtMs,
                        'lesson-activities': lessonActivities
                    }
                ]
            };
        }

        async function syncProjectToApi(project) {
            if (!isUserAuthenticated()) return null;
            try {
                const payload = buildDiyProjectsPayload(project);
                console.log('TMK DIY payload:', JSON.stringify(payload, null, 2));
                const response = await fetch(`${OAUTH_CONFIG.API_ORIGIN}${DIY_PROJECTS_ENDPOINT}`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) return null;
                const result = await response.json();
                const projects = getAllProjects();
                const idx = projects.findIndex(p => p.id === project.id);
                if (idx !== -1) {
                    projects[idx].syncedAt = new Date().toISOString();
                    projects[idx].modifiedAtMs = Date.now();
                    if (result && result.id) projects[idx].remoteId = result.id;
                    saveAllProjects(projects);
                }
                return result;
            } catch (err) {
                console.error('Project sync failed:', err);
                return null;
            }
        }

        function formatActivityDate(ms) {
            try {
                if (Number.isFinite(Number(ms))) {
                    return new Date(Number(ms)).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                }
                return '';
            } catch {
                return '';
            }
        }

        function renderLessonActivities(project) {
            const activities = Array.isArray(project.lessonActivities) ? project.lessonActivities : [];
            if (activities.length === 0) {
                return '<div class="pm-activity-list"><div class="pm-activity-label">No lesson activities yet.</div></div>';
            }

            return `
                <div class="pm-activity-list">
                    ${activities.map((activity, idx) => `
                        <div class="pm-activity-item">
                            ${project.source === 'local'
                                ? `<input class="pm-activity-name-input ${selectedLessonActivity && selectedLessonActivity.projectId === project.id && selectedLessonActivity.activityIndex === idx ? 'selected' : ''}" data-project-id="${project.id}" data-activity-index="${idx}" value="${escapeHtml(String(activity['lesson-name'] || project.name || 'Lesson'))}" maxlength="80">`
                                : `<span class="pm-activity-label" title="${escapeHtml(String(activity['lesson-name'] || project.name || 'Lesson'))}">${escapeHtml(String(activity['lesson-name'] || project.name || 'Lesson'))}</span>`}
                            <span class="pm-activity-label">${escapeHtml(String(activity['tmk-template'] || 'unknown'))}${formatActivityDate(activity['modified-at']) ? ` - ${formatActivityDate(activity['modified-at'])}` : ''}</span>
                            <div class="pm-activity-actions">
                                <button class="pm-btn pm-btn-load-activity" data-action="load-activity" data-project-id="${project.id}" data-activity-index="${idx}">Load</button>
                                ${project.source === 'local'
                                    ? `<button class="pm-btn pm-btn-update-activity" data-action="update-activity" data-project-id="${project.id}" data-activity-index="${idx}">Update</button>
                                       <button class="pm-btn pm-btn-delete-activity" data-action="delete-activity" data-project-id="${project.id}" data-activity-index="${idx}">Del</button>`
                                    : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProjectList() {
            const listEl = document.getElementById('pmProjectList');
            if (!listEl) return;
            const projects = getDisplayProjects();
            if (projects.length === 0) {
                listEl.innerHTML = '<div class="pm-empty">No saved projects yet.</div>';
                updateProjectContextUI();
                return;
            }
            listEl.innerHTML = projects.map(p => `
                <div class="pm-project-item ${p.source === 'local' && p.id === selectedLocalProjectId ? 'selected' : ''}">
                    <div class="pm-project-info">
                        <div class="pm-project-title-row">
                            <div class="pm-project-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
                            <span class="pm-activity-count-badge" title="Lesson activities saved in this project">${Array.isArray(p.lessonActivities) ? p.lessonActivities.length : 0}</span>
                        </div>
                        <div class="pm-project-meta">
                            ${formatProjectDate(p.createdAt)}
                            ${p.source === 'cloud'
                                ? '<span class="pm-project-synced">&#9729; Cloud</span>'
                                : (p.syncedAt ? '<span class="pm-project-synced">&#10003; Synced</span>' : '<span class="pm-project-synced" style="color:#888">Local</span>')}
                        </div>
                        ${renderLessonActivities(p)}
                    </div>
                    ${p.source === 'local' ? `<button class="pm-btn pm-btn-load" data-action="select-project" data-id="${p.id}">Select</button>` : ''}
                    ${p.source === 'local' ? `<button class="pm-btn pm-btn-new-activity" data-action="new-activity" data-id="${p.id}">New Activity</button>` : ''}
                    <button class="pm-btn pm-btn-load" data-action="load" data-id="${p.id}">Load Latest</button>
                    ${p.source === 'local' ? `<button class="pm-btn pm-btn-delete" data-action="delete" data-id="${p.id}">Del</button>` : ''}
                </div>
            `).join('');

            if (isLoadingCloudProjects) {
                listEl.innerHTML += '<div class="pm-empty" style="padding-top:10px">Loading cloud projects...</div>';
            }

            updateProjectContextUI();
        }

        function updatePmSyncBar() {
            const bar = document.getElementById('pmSyncBar');
            const status = document.getElementById('pmSyncStatus');
            if (!bar) return;
            if (isUserAuthenticated()) {
                bar.style.display = 'flex';
                const unsynced = getAllProjects().filter(p => p.formName === FORM_NAME && !p.syncedAt).length;
                const emailLabel = getUserEmail();
                const syncText = unsynced > 0
                    ? `${unsynced} project(s) not yet synced`
                    : '\u2713 All projects synced';
                status.textContent = emailLabel ? `${syncText} \u2014 ${emailLabel}` : syncText;
            } else {
                bar.style.display = 'none';
                setCloudLoadStatus('');
            }
            updateRefreshCloudButtonState();
        }

        function promptProjectManagerLogin() {
            const shouldLogin = confirm('Project Manager requires Teachable login. Log in now?');
            if (shouldLogin) {
                initiateOAuthLogin();
            }
        }

        function showProjectManager() {
            if (!isUserAuthenticated()) {
                promptProjectManagerLogin();
                return;
            }

            document.getElementById('projectManager').classList.add('show');
            document.getElementById('pmToggleBtn').classList.add('active');
            renderProjectList();
            updatePmSyncBar();
            loadCloudProjects();
        }

        function hideProjectManager() {
            document.getElementById('projectManager').classList.remove('show');
            document.getElementById('pmToggleBtn').classList.remove('active');
        }

        document.getElementById('pmToggleBtn').addEventListener('click', function () {
            if (!isUserAuthenticated()) {
                promptProjectManagerLogin();
                return;
            }

            if (document.getElementById('projectManager').classList.contains('show')) {
                hideProjectManager();
            } else {
                showProjectManager();
            }
        });

        document.getElementById('pmCloseBtn').addEventListener('click', hideProjectManager);

        document.getElementById('pmProjectList').addEventListener('click', function (e) {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const id = btn.dataset.id;
            const action = btn.dataset.action;
            if (action === 'select-project') {
                const project = getDisplayProjects().find(p => p.id === id && p.source === 'local');
                if (!project) return;
                setSelectedLocalProject(project.id);
                renderProjectList();
            } else if (action === 'new-activity') {
                const localProject = getLocalProjectById(id);
                if (!localProject) {
                    return;
                }

                const requestedName = String(window.prompt('Lesson activity name:', '') || '').trim();
                const created = createNewBlankLessonActivity(localProject.id, requestedName || localProject.name || 'Lesson Activity');
                if (!created || !created.project) {
                    return;
                }
                setSelectedLocalProject(created.project.id);
                setSelectedLessonActivity(created.project.id, created.activityIndex);

                // New lesson activity starts from a clean slate in form and autosave storage.
                clearFormStorage();

                renderProjectList();
                updatePmSyncBar();
            } else if (action === 'load') {
                const project = getDisplayProjects().find(p => p.id === id);
                const latest = project ? getLatestLessonActivity(project) : null;
                if (project && latest && confirm(`Load latest lesson activity from "${project.name}"? Your current answers will be replaced.`)) {
                    applyFormData(latest['lesson-input-data'] || {});
                    if (project.source === 'local') {
                        setSelectedLocalProject(project.id);
                        const activities = getProjectLessonActivities(project);
                        const latestIndex = Math.max(activities.length - 1, 0);
                        setSelectedLessonActivity(project.id, latestIndex);
                    }
                    hideProjectManager();
                }
            } else if (action === 'load-activity') {
                const projectId = btn.dataset.projectId;
                const activityIndex = Number.parseInt(btn.dataset.activityIndex || '', 10);
                const project = getDisplayProjects().find(p => p.id === projectId);
                const activities = project ? getProjectLessonActivities(project) : [];
                const activity = Number.isInteger(activityIndex) ? activities[activityIndex] : null;
                if (project && activity && confirm(`Load lesson activity "${activity['lesson-name'] || project.name}" from "${project.name}"? Your current answers will be replaced.`)) {
                    applyFormData(activity['lesson-input-data'] || {});
                    if (project.source === 'local') {
                        setSelectedLocalProject(project.id);
                        setSelectedLessonActivity(project.id, activityIndex);
                    }
                    hideProjectManager();
                }
            } else if (action === 'update-activity') {
                const projectId = btn.dataset.projectId;
                const activityIndex = Number.parseInt(btn.dataset.activityIndex || '', 10);
                if (!Number.isInteger(activityIndex)) return;

                const nameInput = btn.closest('.pm-activity-item')?.querySelector('.pm-activity-name-input');
                const requestedName = String(nameInput ? nameInput.value : '').trim();

                const projects = getAllProjects();
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const activities = getProjectLessonActivities(project);
                if (!activities[activityIndex]) return;

                const uniqueName = getUniqueLessonActivityName(project, requestedName || project.name || 'Lesson Activity', activityIndex);
                activities[activityIndex] = {
                    ...activities[activityIndex],
                    'lesson-name': uniqueName,
                    'modified-at': Date.now(),
                    'lesson-input-data': normalizeIntroLessonInputData(captureCurrentFormData())
                };

                project.lessonActivities = activities;
                project.modifiedAtMs = Date.now();
                project.syncedAt = null;
                saveAllProjects(projects);
                setSelectedLocalProject(project.id);
                setSelectedLessonActivity(project.id, activityIndex);
                renderProjectList();
                updatePmSyncBar();
            } else if (action === 'delete-activity') {
                const projectId = btn.dataset.projectId;
                const activityIndex = Number.parseInt(btn.dataset.activityIndex || '', 10);
                if (!Number.isInteger(activityIndex)) return;

                const projects = getAllProjects();
                const projectIndex = projects.findIndex(p => p.id === projectId);
                if (projectIndex === -1) return;

                const project = projects[projectIndex];
                const activities = getProjectLessonActivities(project);
                const activity = activities[activityIndex];
                if (!activity) return;

                if (!confirm(`Delete lesson activity "${activity['lesson-name'] || 'Unnamed'}" from "${project.name}"?`)) {
                    return;
                }

                const nextActivities = activities.filter((_, idx) => idx !== activityIndex);
                if (nextActivities.length === 0) {
                    projects.splice(projectIndex, 1);
                    if (selectedLocalProjectId === projectId) {
                        selectedLocalProjectId = null;
                    }
                    selectedLessonActivity = null;
                } else {
                    project.lessonActivities = nextActivities;
                    project.modifiedAtMs = Date.now();
                    project.syncedAt = null;
                    setSelectedLocalProject(project.id);
                    if (selectedLessonActivity && selectedLessonActivity.projectId === project.id) {
                        if (selectedLessonActivity.activityIndex === activityIndex) {
                            setSelectedLessonActivity(project.id, Math.max(activityIndex - 1, 0));
                        } else if (selectedLessonActivity.activityIndex > activityIndex) {
                            setSelectedLessonActivity(project.id, selectedLessonActivity.activityIndex - 1);
                        }
                    }
                }

                saveAllProjects(projects);
                renderProjectList();
                updatePmSyncBar();
            } else if (action === 'delete') {
                const project = getAllProjects().find(p => p.id === id);
                if (project && confirm(`Delete "${project.name}"? This cannot be undone.`)) {
                    deleteLocalProject(id);
                    if (selectedLocalProjectId === id) {
                        selectedLocalProjectId = null;
                    }
                    if (selectedLessonActivity && selectedLessonActivity.projectId === id) {
                        selectedLessonActivity = null;
                    }
                    renderProjectList();
                    updatePmSyncBar();
                }
            }
        });

        document.getElementById('pmCreateProjectBtn').addEventListener('click', function () {
            const nameInput = document.getElementById('pmNameInput');
            const projectName = String(nameInput ? nameInput.value : '').trim();
            if (!projectName) {
                if (nameInput) {
                    nameInput.focus();
                }
                return;
            }

            const project = createLocalProject(projectName);
            if (!project) {
                return;
            }

            setSelectedLocalProject(project.id);
            if (nameInput) {
                nameInput.value = '';
            }
            renderProjectList();
            updatePmSyncBar();
        });

        document.getElementById('pmSyncBtn').addEventListener('click', async function () {
            const syncBtn = document.getElementById('pmSyncBtn');
            const syncStatus = document.getElementById('pmSyncStatus');
            if (!isUserAuthenticated()) return;
            syncBtn.disabled = true;
            syncStatus.textContent = 'Syncing\u2026';
            const unsynced = getAllProjects().filter(p => p.formName === FORM_NAME && !p.syncedAt);
            let count = 0;
            for (const p of unsynced) {
                const result = await syncProjectToApi(p);
                if (result) count++;
            }
            syncStatus.textContent = count > 0
                ? `\u2713 ${count} project(s) synced to cloud`
                : (unsynced.length === 0 ? '\u2713 All projects already synced' : 'Sync failed \u2014 check connection');
            await loadCloudProjects();
            renderProjectList();
            syncBtn.disabled = false;
        });

        document.getElementById('pmRefreshCloudBtn').addEventListener('click', async function () {
            await loadCloudProjects();
            if (!cloudLoadError) {
                showCloudRefreshSuccess();
            }
        });

        // Disable Project Manager access until authentication is verified.
        updateProjectManagerAccess();
        updateProjectContextUI();

        // Login button handler
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.addEventListener('click', async function(e) {
            e.preventDefault();

            if (isUserAuthenticated()) {
                loginBtn.disabled = true;
                await logoutFromTeachable();
                renderAuthStatus();
                loginBtn.disabled = false;
            } else {
                initiateOAuthLogin();
            }
        });
    </script>
</body>
</html>
